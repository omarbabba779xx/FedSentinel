client:
  local_epochs: 3
  batch_size: 256
  learning_rate: 0.001
  optimizer: "adam"            # adam | sgd | adamw
  weight_decay: 1e-4
  gradient_clip: 1.0

privacy:
  enabled: true
  mechanism: "dp_sgd"          # dp_sgd | gaussian | laplace
  epsilon: 1.0                 # privacy budget
  delta: 1e-5
  max_grad_norm: 1.0
  noise_multiplier: 1.1        # auto-computed if null
  adaptive_clipping: true

data:
  dataset: "nsl_kdd"           # nsl_kdd | cicids2017 | both
  non_iid: true
  alpha: 0.5                   # Dirichlet concentration (lower = more non-IID)
  validation_split: 0.2
  augmentation: true

model:
  architecture: "transformer"  # lstm | transformer | ensemble
  hidden_dim: 128
  num_layers: 4
  dropout: 0.3
  attention_heads: 8

free_rider_detection:
  enabled: true
  contribution_threshold: 0.05
